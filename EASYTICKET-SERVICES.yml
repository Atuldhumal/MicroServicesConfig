spring:
  application:
    name: EASYTICKET-SERVICES
    # taken from previous project
    datasource:
      url: jdbc:postgresql://localhost:5434/MS_easyticket_Services
      username: postgres
      password: postgres
    jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true
server:
  port: 9095
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: EASYTICKET-SERVICES-${spring.application.instance_id:${random.value}}

    # for automatic refresh actuator on property
management:
  endpoints:
    web:
      exposure:
        include: "*"

  # rabbitMQ related config
rabbitmq:
  host: localhost
  port: 5672
  username: guest
  password: guest
