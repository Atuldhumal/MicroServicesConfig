spring:
  application:
    name: EASYTICKET-SERVICES

  datasource:
    url: jdbc:postgresql://localhost:5434/MS_easyticket_Services
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # rabbitmq:
  #   host: localhost
  #   port: 5672
  #   username: guest
  #   password: guest

server:
  port: 9095

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: EASYTICKET-SERVICES-${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: "*"

config:
  value: you are in default property from git new content rabbit installed   easyticket final check
